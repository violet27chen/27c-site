{% extends "base.html" %}

{% block title %}{{ t('login_title') }} - 27c.site{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>{{ t('login_title') }}</h1>
        <p class="auth-sub">{{ t('login_sub') }}</p>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">{{ t('label_username') }}</label>
                <input type="text" id="username" name="username" required
                       placeholder="{{ t('placeholder_username') }}" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">{{ t('label_password') }}</label>
                <input type="password" id="password" name="password" required
                       placeholder="{{ t('placeholder_password') }}" autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-full">{{ t('btn_login') }}</button>
        </form>

        <p class="auth-switch">
            {{ t('no_account') }} <a href="{{ url_for('register') }}">{{ t('register_now') }}</a>
        </p>
    </div>
</div>
{% endblock %}
